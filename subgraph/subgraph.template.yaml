specVersion: 1.0.0
# buildTag: __BUILD_TAG__
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: AbstractAccountFactory
    network: sepolia
    source:
      abi: AbstractAccountFactory
      address: "__FACTORY_ADDRESS__"
      startBlock: __FACTORY_START_BLOCK__
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Account
      abis:
        - name: AbstractAccountFactory
          file: ../contracts/artifacts/src/factory/AbstractAccountFactory.sol/AbstractAccountFactory.json
      eventHandlers:
        - event: AccountDeployed(indexed address,indexed address,address,bytes32,address)
          handler: handleAccountDeployed
      file: ./src/factory.ts

  - kind: ethereum
    name: WhitelistRequestModule
    network: sepolia
    source:
      abi: WhitelistRequestModule
      address: "__WHITELIST_MODULE_ADDRESS__"
      startBlock: __WHITELIST_MODULE_START_BLOCK__
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - WhitelistRequest
      abis:
        - name: WhitelistRequestModule
          file: ../contracts/artifacts/src/modules/WhitelistRequestModule.sol/WhitelistRequestModule.json
      eventHandlers:
        - event: WhitelistRequested(indexed address,indexed uint256,indexed address,bytes4,string)
          handler: handleWhitelistRequested
        - event: WhitelistApproved(indexed address,indexed uint256,indexed address,bytes4)
          handler: handleWhitelistApproved
        - event: WhitelistRejected(indexed address,indexed uint256)
          handler: handleWhitelistRejected
        - event: WhitelistRequestCancelled(indexed address,indexed uint256)
          handler: handleWhitelistRequestCancelled
      file: ./src/whitelist-request-module.ts

  - kind: ethereum
    name: PolicyHookRuleSpend
    network: sepolia
    source:
      abi: PolicyHookRuleSpend
      address: "__POLICY_HOOK_ADDRESS__"
      startBlock: __POLICY_HOOK_START_BLOCK__
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - WhitelistEntry
        - GlobalSpendLimit
        - PolicyRule
        - PolicyConfig
      abis:
        - name: PolicyHookRuleSpend
          file: ../contracts/artifacts/src/hooks/PolicyHookRuleSpend.sol/PolicyHookRuleSpend.json
      eventHandlers:
        - event: WhitelistEntryAdded(indexed address,indexed address,indexed bytes4)
          handler: handleWhitelistEntryAdded
        - event: WhitelistEntryRemoved(indexed address,indexed address,indexed bytes4)
          handler: handleWhitelistEntryRemoved
        - event: SpendLimitSet(indexed address,indexed address,uint256,uint256)
          handler: handleSpendLimitSet
        - event: SpendLimitRemoved(indexed address,indexed address)
          handler: handleSpendLimitRemoved
        - event: NativeValueCapSet(indexed address,uint256)
          handler: handleNativeValueCapSet
        - event: AccountPaused(indexed address)
          handler: handleAccountPaused
        - event: AccountUnpaused(indexed address)
          handler: handleAccountUnpaused
        - event: EqRuleAdded(indexed address,indexed bytes32,indexed address,bytes4)
          handler: handleEqRuleAdded
        - event: EqRuleRemoved(indexed address,indexed bytes32)
          handler: handleEqRuleRemoved
        - event: RuleSpendLimitSet(indexed address,indexed bytes32,uint8,uint256,uint256)
          handler: handleRuleSpendLimitSet
      file: ./src/policy-hook.ts

  - kind: ethereum
    name: AgentSessionValidator
    network: sepolia
    source:
      abi: AgentSessionValidator
      address: "__AGENT_SESSION_VALIDATOR_ADDRESS__"
      startBlock: __AGENT_SESSION_VALIDATOR_START_BLOCK__
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentSession
      abis:
        - name: AgentSessionValidator
          file: ../contracts/artifacts/src/validators/AgentSessionValidator.sol/AgentSessionValidator.json
      eventHandlers:
        - event: SessionCreated(indexed address,indexed uint256,indexed address,uint48,uint48)
          handler: handleSessionCreated
        - event: SessionRevoked(indexed address,indexed uint256)
          handler: handleSessionRevoked
      file: ./src/agent-session-validator-static.ts

templates:
  - kind: ethereum
    name: IsolatedAccount
    network: sepolia
    source:
      abi: IsolatedAccount
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Account
        - ExecutionEnvelope
        - ExecutionCall
      abis:
        - name: IsolatedAccount
          file: ../contracts/artifacts/src/accounts/IsolatedAccount.sol/IsolatedAccount.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: PolicyHookSet(indexed address)
          handler: handlePolicyHookSet
        - event: AgentSessionValidatorSet(indexed address)
          handler: handleAgentSessionValidatorSet
        - event: ExecutionEnvelope(indexed address,indexed address,indexed address,uint256,bytes32,uint256,bytes32,uint256,bool)
          handler: handleExecutionEnvelope
        - event: Executed(indexed address,uint256,bytes4,indexed uint256,indexed bytes32,uint256)
          handler: handleExecuted
      file: ./src/isolated-account.ts

  - kind: ethereum
    name: AgentSessionValidator
    network: sepolia
    source:
      abi: AgentSessionValidator
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentSession
      abis:
        - name: AgentSessionValidator
          file: ../contracts/artifacts/src/validators/AgentSessionValidator.sol/AgentSessionValidator.json
      eventHandlers:
        - event: SessionCreated(indexed address,indexed uint256,indexed address,uint48,uint48)
          handler: handleSessionCreated
        - event: SessionRevoked(indexed address,indexed uint256)
          handler: handleSessionRevoked
      file: ./src/agent-session-validator.ts
